name: "Build and Test"

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

env:
  GO_VERSION: 1.24
jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
    # There are too many lint errors in current code bases
    # uncomment when we decide what lint should be addressed or ignored.
    # - run: make lint

  coverage-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Golang Caches
        uses: actions/cache@v4
        with:
          path: |-
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-go

      - run: git stash # restore patch

      # test
      - name: Run Coverage Tests
        run: |-
          go version
          GOPROXY="https://proxy.golang.org,direct" make go.test.coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: false
          files: ./coverage.xml
          verbose: true

  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04
    needs: [lint, coverage-test]
    steps:
      - name: "Checkout ${{ github.ref }}"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: "Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Golang Caches
        uses: actions/cache@v4
        with:
          path: |-
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-go

      - run: git stash # restore patch

      - name: "Build Higress Binary"
        run: GOPROXY="https://proxy.golang.org,direct" make build

      - name: Upload Higress Binary
        uses: actions/upload-artifact@v4
        with:
          name: higress
          path: out/

  higress-gateway-api-test:
    runs-on: ubuntu-22.04
    needs: [build]
    env:
      GATEWAY_API_TEST_NAMESPACE: gateway-conformance-infra
    steps:
      - uses: actions/checkout@v4

      - name: Disable containerd image store
        run: |
          sudo bash -c 'cat > /etc/docker/daemon.json << EOF
          {
            "features": {
              "containerd-snapshotter": false
            }
          }
          EOF'
          sudo systemctl restart docker
          docker info -f '{{ .DriverStatus }}'

      - name: Free Up GitHub Actions Ubuntu Runner Disk Space 🔧
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: "Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Golang Caches
        uses: actions/cache@v4
        with:
          path: |-
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-go

      - name: Run Higress Gateway API Tests
        run: |-
          GOPROXY="https://proxy.golang.org,direct" make higress-gateway-api-test \
            HIGRESS_CONFORMANCE_VERSION=${{ github.event.pull_request.head.sha || github.sha }}

      - name: Collect Gateway API Test Diagnostics
        if: always()
        run: |-
          mkdir -p out/gateway-api-conformance/diagnostics
          kubectl get gatewayclass,gateway,httproute,referencegrant -A -o yaml > out/gateway-api-conformance/diagnostics/resources.yaml 2>&1 || true
          kubectl get events -A --sort-by=.lastTimestamp > out/gateway-api-conformance/diagnostics/events.txt 2>&1 || true
          kubectl logs -n "${GATEWAY_API_TEST_NAMESPACE}" deployment/higress-controller --all-containers > out/gateway-api-conformance/diagnostics/controller.log 2>&1 || true
          kubectl logs -n "${GATEWAY_API_TEST_NAMESPACE}" deployment/higress-gateway --all-containers > out/gateway-api-conformance/diagnostics/gateway.log 2>&1 || true
          tools/bin/kind-gateway-api export logs out/gateway-api-conformance/diagnostics/kind --name higress || true

      - name: Upload Gateway API Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: higress-gateway-api-test
          path: out/gateway-api-conformance/
          if-no-files-found: warn

      - name: Clean Gateway API Test Environment
        if: always()
        run: make higress-gateway-api-test-clean

  higress-conformance-test:
    runs-on: ubuntu-22.04
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Disable containerd image store
        run: |
          sudo bash -c 'cat > /etc/docker/daemon.json << EOF
          {
            "features": {
              "containerd-snapshotter": false
            }
          }
          EOF'
          sudo systemctl restart docker
          docker info -f '{{ .DriverStatus }}'

      - name: Free Up GitHub Actions Ubuntu Runner Disk Space 🔧
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: "Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Golang Caches
        uses: actions/cache@v4
        with:
          path: |-
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ github.run_id }}
          # key: ${{ runner.os }}-go-${{ env.GO_VERSION }}

          restore-keys: ${{ runner.os }}-go

      - run: git stash # restore patch

      - name: update go mod
        run: |-
          make prebuild
          go mod tidy

      - name: "Run Higress E2E Conformance Tests"
        run: GOPROXY="https://proxy.golang.org,direct" make higress-conformance-test

  publish:
    runs-on: ubuntu-22.04
    needs: [higress-conformance-test, higress-gateway-api-test]
    steps:
      - uses: actions/checkout@v4
