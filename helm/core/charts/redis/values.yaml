# Default values for redis.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
global:
  # -- Specify the image registry and pull policy
  # Will inherit from parent chart's global.hub if not set
  hub: ""
  # -- Specify image pull policy if default behavior isn't desired.
  # Default behavior: latest images will be Always else IfNotPresent.
  imagePullPolicy: ""
  # -- Specify the image pull secrets
  imagePullSecrets: []

redis:
  # -- Specify the name
  name: redis-stack-server
  # -- Specify the image
  image: "redis-stack-server"
  # -- Specify the tag
  tag: "7.4.0-v3"
  # -- Specify the number of replicas
  replicas: 1
  # -- Specify the password, if not set, no password is used
  password: ""
  # -- Service parameters
  service:
    # -- Exporter service type
    type: ClusterIP
    # -- Exporter service port
    port: 6379
  # -- Specify the resources
  resources: {}
  # -- NodeSelector Node labels for Redis
  nodeSelector: {}
  # -- Tolerations for Redis
  tolerations: []
  # -- Affinity for Redis
  affinity: {}
  persistence:
    # -- Enable persistence on Redis. When enabled, a PVC is mounted at /data.
    enabled: false
    # -- If defined, storageClassName: <storageClass>
    # -- If undefined (the default) or set to null, no storageClassName spec is set, choosing the default provisioner
    storageClass: ""
    # -- Persistent Volume access modes
    accessModes:
      - ReadWriteOnce
    # -- Persistent Volume size
    size: 1Gi
  # -- AOF (Append-Only File) persistence settings. Only effective when persistence.enabled=true.
  # AOF logs every write operation, providing best durability (up to 1s data loss with everysec).
  # Redis prefers AOF for recovery when both AOF and RDB are enabled.
  aof:
    # -- Enable AOF persistence. Default is true. Set to false if you prefer RDB-only persistence.
    enabled: true
    # -- AOF fsync policy: always, everysec, or no.
    # "everysec" balances durability (≤1s data loss) and performance. See https://redis.io/docs/management/persistence/
    fsync: everysec
    # -- Rewrite AOF when size exceeds this percentage of base file. Default 100 = 2x size.
    rewritePercentage: 100
    # -- Minimum AOF file size to trigger rewrite. Default 64mb prevents frequent rewrites.
    rewriteMinSize: 64mb
  # -- RDB (Redis Database) snapshot persistence settings. Only effective when persistence.enabled=true.
  # RDB provides compact point-in-time snapshots, useful for backups and faster restart.
  # Can be enabled alongside AOF for dual persistence strategy.
  rdb:
    # -- Enable RDB snapshots. Default is true. Set to false if you prefer AOF-only persistence.
    enabled: true
    # -- RDB snapshot schedule as "seconds changes" pairs. Redis saves when ANY rule is matched.
    # Common defaults: "900 1" (15min/1 key), "300 10" (5min/10 keys), "60 10000" (1min/10000 keys).
    # Set to empty list [] to disable RDB. See https://redis.io/docs/management/persistence/
    save:
      - "900 1"
      - "300 10"
      - "60 10000"
  # -- Extra redis-stack.conf directives appended after the generated config
  # (requirepass, and AOF defaults when persistence is enabled).
  # Directives here take precedence over generated defaults (Redis applies the last value).
  # Example:
  #   maxmemory 512mb
  #   maxmemory-policy allkeys-lru
  extraConfig: ""
