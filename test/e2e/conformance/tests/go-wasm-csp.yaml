apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasmplugin-csp
  namespace: higress-conformance-infra
spec:
  ingressClassName: higress
  rules:
    - host: "foo.com"
      http:
        paths:
          - pathType: Prefix
            path: "/foo"
            backend:
              service:
                name: infra-backend-v1
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasmplugin-csp-report-only
  namespace: higress-conformance-infra
spec:
  ingressClassName: higress
  rules:
    - host: "foo.com"
      http:
        paths:
          - pathType: Prefix
            path: "/report"
            backend:
              service:
                name: infra-backend-v1
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasmplugin-csp-dual
  namespace: higress-conformance-infra
spec:
  ingressClassName: higress
  rules:
    - host: "foo.com"
      http:
        paths:
          - pathType: Prefix
            path: "/dual"
            backend:
              service:
                name: infra-backend-v1
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasmplugin-csp-keep
  namespace: higress-conformance-infra
spec:
  ingressClassName: higress
  rules:
    - host: "foo.com"
      http:
        paths:
          - pathType: Prefix
            path: "/keep"
            backend:
              service:
                name: infra-backend-v1
                port:
                  number: 8080
---
apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: csp
  namespace: higress-system
spec:
  defaultConfigDisable: true
  matchRules:
    - config:
        policy: "default-src 'self'; img-src *"
      configDisable: false
      ingress:
        - higress-conformance-infra/wasmplugin-csp
    - config:
        policy: "default-src 'self'"
        report_only: true
      configDisable: false
      ingress:
        - higress-conformance-infra/wasmplugin-csp-report-only
    - config:
        policy: "default-src 'self'; img-src *"
        report_only_policy: "default-src 'self'; img-src 'self'"
      configDisable: false
      ingress:
        - higress-conformance-infra/wasmplugin-csp-dual
    - config:
        policy: "default-src 'self'"
        override: false
      configDisable: false
      ingress:
        - higress-conformance-infra/wasmplugin-csp-keep
  url: file:///opt/plugins/wasm-go/extensions/csp/plugin.wasm
