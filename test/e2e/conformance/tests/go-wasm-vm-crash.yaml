apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasmplugin-vm-crash-fail-open
  namespace: higress-conformance-infra
spec:
  ingressClassName: higress
  rules:
    - host: "fail-open.foo.com"
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: infra-backend-v1
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasmplugin-vm-crash-fail-close
  namespace: higress-conformance-infra
spec:
  ingressClassName: higress
  rules:
    - host: "fail-close.foo.com"
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: infra-backend-v1
                port:
                  number: 8080
---
apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: vm-crash-fail-open
  namespace: higress-system
spec:
  defaultConfigDisable: true
  failStrategy: FAIL_OPEN
  matchRules:
    - configDisable: false
      config: {}
      ingress:
        - higress-conformance-infra/wasmplugin-vm-crash-fail-open
  url: file:///opt/plugins/wasm-go/extensions/vm-crash/plugin.wasm
---
apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: vm-crash-fail-close
  namespace: higress-system
spec:
  defaultConfigDisable: true
  failStrategy: FAIL_CLOSE
  matchRules:
    - configDisable: false
      config: {}
      ingress:
        - higress-conformance-infra/wasmplugin-vm-crash-fail-close
  url: file:///opt/plugins/wasm-go/extensions/vm-crash/plugin.wasm
