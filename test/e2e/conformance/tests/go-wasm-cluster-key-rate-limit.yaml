# Deploy Redis service (isolated from other E2E tests)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cluster-key
  namespace: higress-conformance-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cluster-key
  template:
    metadata:
      labels:
        app: redis-cluster-key
    spec:
      containers:
        - name: redis
          image: redis:6.2
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-key
  namespace: higress-conformance-infra
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis-cluster-key
---
# Ingress points to infra-backend-v1 (request-count backend, no token semantics)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cluster-key-rate-limit
  namespace: higress-conformance-infra
spec:
  ingressClassName: higress
  rules:
    - host: "foo.com"
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: infra-backend-v1
                port:
                  number: 8080
---
# 混合限流配置：
# - global_threshold: query_per_minute=3
# - rule_items: x-api-key=vip-key 限 1 query/分钟
# 阈值故意设小，便于通过少量请求触发限流
apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: cluster-key-rate-limit
  namespace: higress-system
spec:
  defaultConfig:
    rule_name: "e2e-cluster-key-hybrid"
    global_threshold:
      query_per_minute: 3
    rule_items:
      - limit_by_header: "x-api-key"
        limit_keys:
          - key: "vip-key"
            query_per_minute: 1
    redis:
      service_name: "redis-cluster-key.higress-conformance-infra.svc.cluster.local"
      service_port: 6379
      timeout: 1000
    show_limit_quota_header: true
    rejected_code: 429
    rejected_msg: "Too many requests"
  matchRules:
    - config:
        rule_name: "e2e-cluster-key-hybrid"
        global_threshold:
          query_per_minute: 3
        rule_items:
          - limit_by_header: "x-api-key"
            limit_keys:
              - key: "vip-key"
                query_per_minute: 1
        redis:
          service_name: "redis-cluster-key.higress-conformance-infra.svc.cluster.local"
          service_port: 6379
          timeout: 1000
        show_limit_quota_header: true
        rejected_code: 429
        rejected_msg: "Too many requests"
      configDisable: false
      ingress:
        - higress-conformance-infra/cluster-key-rate-limit
  url: file:///opt/plugins/wasm-go/extensions/cluster-key-rate-limit/plugin.wasm
